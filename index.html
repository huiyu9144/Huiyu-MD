<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#171717" />
    <title>Huiyu MD</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script>(function(){try{var t=localStorage.getItem('theme');var b=t==='light'?'#F5F5F5':'#171717';var s=t==='light'?'light':'dark';document.documentElement.dataset.theme=s;document.documentElement.style.cssText='--bg:'+b+';background:'+b+';color-scheme:'+s}catch(e){}})()</script>
    <style>html,body{background:var(--bg,#171717);margin:0}</style>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
