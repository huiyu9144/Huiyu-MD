name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  macos:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: "aarch64-apple-darwin,x86_64-apple-darwin" }
      - name: npm ci
        run: npm ci
      - name: Build universal DMG
        run: npx tauri build --bundles dmg --target universal-apple-darwin
        env: { CI: true }
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: huiyu-md-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  windows:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: npm ci
        run: npm ci
      - name: Build
        run: npx tauri build
        env: { CI: true }
      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
